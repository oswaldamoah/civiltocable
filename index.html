<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert civil distances to optimal cable configurations - Powered by MTN">
  <meta name="theme-color" content="#ffcc00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MTN CableCalc">
  <meta name="msapplication-TileColor" content="#ffcc00">
  <title>CivilToCable Distance Converter | MTN</title>

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/960px-New-mtn-logo.jpg">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/960px-New-mtn-logo.jpg">

  <style>
    @font-face {
      font-family: 'MTNBrighterSans';
      src: url('./MTNBrighterSans-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'MTNBrighterSans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #000000;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1, h3, button {
      font-family: 'MTNBrighterSans', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background-color: #1a1a1a;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid #ffcc00;
      position: relative;
    }

    .mtn-logo {
      display: block;
      margin: 0 auto 20px auto;
      width: 80px;
      height: auto;
    }

    h1 {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #ffcc00, #ffa500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      margin-bottom: 30px;
    }

    .section h3 {
      color: #b0b0b0;
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 1rem;
      background-color: #252525;
      color: white;
    }

    input:focus {
      outline: none;
      border-color: #ffcc00;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #ffcc00, #ffa500);
      color: #000;
      cursor: pointer;
      flex-grow: 1;
      min-width: 120px;
    }

    button.secondary {
      background: #252525;
      color: #b0b0b0;
    }

    button.danger {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    #cablesList {
      padding: 10px 15px;
      background: rgba(255, 204, 0, 0.1);
      border-radius: 8px;
      color: #ffcc00;
      display: inline-block;
      margin-top: 10px;
    }

    #calculateModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      border: 1px solid #ffcc00;
    }

    .close-btn {
      position: absolute;
      right: 15px;
      top: 15px;
      background: transparent;
      color: #fff;
      font-size: 1.5rem;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .result-success {
      background: rgba(46,125,50,0.2);
      color: #4caf50;
    }

    .result-error {
      background: rgba(211,47,47,0.2);
      color: #f44336;
    }

    .result-value {
      font-size: 2rem;
    }

    .install-pwa {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ffcc00, #ffa500);
      border-radius: 50px;
      padding: 15px 25px;
      display: none;
    }

    .install-pwa.show {
      display: block;
    }
  </style>
</head>

<body>

<div class="container">
  <img class="mtn-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/960px-New-mtn-logo.jpg">
  <h1>Civil To Cable Converter</h1>

  <div class="section">
    <h3>Available Cables (meters)</h3>
    <input type="text" id="cablesInput" placeholder="e.g. 50, 60, 80">

    <div class="button-group">
      <button onclick="updateCables()">Update</button>
      <button class="secondary" onclick="exportCables()">Export CSV</button>
    </div>

    <p>Current cables: <span id="cablesList">No cables entered</span></p>
  </div>

  <div class="section">
    <div class="button-group">
      <button onclick="openModal()">Calculate</button>
      <button class="danger" onclick="restart()">Reset</button>
    </div>
  </div>
</div>

<button id="installPWA" class="install-pwa">Install App</button>

<div id="calculateModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3>Calculate Cable Distance</h3>

    <input type="number" id="civilDistance" placeholder="Enter distance">

    <div class="button-group">
      <button onclick="calculateCable()">Calculate</button>
      <button class="secondary" onclick="clearInput()">Clear</button>
    </div>

    <div id="result"></div>
  </div>
</div>

<script>
let availableCables = [];

function updateCables() {
  const input = document.getElementById('cablesInput').value;
  availableCables = input.split(',')
    .map(x => parseFloat(x.trim()))
    .filter(x => !isNaN(x));
  document.getElementById('cablesList').textContent =
    availableCables.join('m, ') + 'm';
}

function calculateCable() {
  const d = parseFloat(document.getElementById('civilDistance').value);
  const result = document.getElementById('result');

  if (!d || availableCables.length === 0) {
    result.className = 'result-error';
    result.innerHTML = 'Invalid input';
    return;
  }

  const required = d + 10;
  const match = availableCables.find(c => c >= required);

  if (match) {
    result.className = 'result-success';
    result.innerHTML = `<div class="result-value">${match}m</div>`;
  } else {
    result.className = 'result-error';
    result.innerHTML = 'No suitable cable';
  }
}

function openModal() {
  document.getElementById('calculateModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('calculateModal').style.display = 'none';
}

function clearInput() {
  document.getElementById('civilDistance').value = '';
}

function restart() {
  availableCables = [];
  document.getElementById('cablesInput').value = '';
  document.getElementById('cablesList').textContent = 'No cables entered';
}

function exportCables() {
  const blob = new Blob([availableCables.join('\n')], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cables.csv';
  a.click();
}
</script>

</body>
</html>
