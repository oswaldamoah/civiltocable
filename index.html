<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>MTN Civil Cable Optimizer</title>

<style>
@font-face {
  font-family: 'MTNBrighterSans';
  src: url('./MTNBrighterSans-Bold.ttf') format('truetype');
  font-weight: bold;
}

/* =========================
   DESIGN SYSTEM (INDUSTRY GRADE)
========================= */
:root {
  --bg: #070707;
  --panel: rgba(255,255,255,0.04);
  --panel-2: rgba(255,255,255,0.06);
  --stroke: rgba(255,204,0,0.25);
  --text: #f5f5f5;
  --muted: #a0a0a0;
  --brand: #ffcc00;
  --danger: #ff4b4b;

  --radius: 18px;
  --radius-sm: 12px;

  --shadow: 0 20px 60px rgba(0,0,0,0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'MTNBrighterSans', system-ui, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 60%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 16px;
}

/* =========================
   MAIN CONTAINER
========================= */
.app {
  width: 100%;
  max-width: 920px;
  background: var(--panel);
  border: 1px solid var(--stroke);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  padding: 32px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 32px;
}

.logo {
  width: 70px;
  margin-bottom: 12px;
}

h1 {
  font-size: 28px;
  letter-spacing: 0.5px;
  background: linear-gradient(90deg, var(--brand), #ffa500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sub {
  color: var(--muted);
  font-size: 14px;
  margin-top: 6px;
}

/* =========================
   GRID LAYOUT
========================= */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

/* SECTION CARD */
.card {
  background: var(--panel-2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius);
  padding: 20px;
}

/* LABELS */
label {
  font-size: 13px;
  color: var(--muted);
  display: block;
  margin-bottom: 8px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(255,204,0,0.15);
}

/* BUTTONS */
.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 14px;
}

button {
  flex: 1;
  min-width: 140px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s ease;
}

.primary {
  background: linear-gradient(135deg, var(--brand), #ff9f1a);
  color: black;
}

.primary:hover {
  transform: translateY(-2px);
}

.secondary {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

.secondary:hover {
  background: rgba(255,255,255,0.1);
}

.danger {
  background: linear-gradient(135deg, #ff4b4b, #d60000);
  color: white;
}

/* CABLE DISPLAY */
.badge {
  margin-top: 12px;
  display: inline-block;
  padding: 8px 12px;
  background: rgba(255,204,0,0.1);
  border: 1px solid rgba(255,204,0,0.2);
  border-radius: 999px;
  color: var(--brand);
  font-size: 13px;
}

/* RESULT */
.result {
  margin-top: 16px;
  padding: 18px;
  border-radius: var(--radius);
  text-align: center;
  font-weight: 600;
}

.success {
  background: rgba(0,255,120,0.08);
  border: 1px solid rgba(0,255,120,0.2);
}

.error {
  background: rgba(255,50,50,0.08);
  border: 1px solid rgba(255,50,50,0.2);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-box {
  width: 100%;
  max-width: 480px;
  background: #111;
  border: 1px solid var(--stroke);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
  color: var(--muted);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .app {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/960px-New-mtn-logo.jpg">
    <h1>Cable Optimization System</h1>
    <div class="sub">Civil Distance → Optimal Cable Matching Engine</div>
  </div>

  <div class="grid">

    <!-- INPUT CARD -->
    <div class="card">
      <label>Available Cable Lengths (meters)</label>
      <input id="cablesInput" placeholder="e.g. 50, 60, 80, 100">

      <div class="actions">
        <button class="primary" onclick="updateCables()">Update Cables</button>
        <button class="secondary" onclick="exportCables()">Export</button>
      </div>

      <div class="badge" id="cablesList">No cables loaded</div>
    </div>

    <!-- ACTION CARD -->
    <div class="card">
      <div class="actions">
        <button class="primary" onclick="openModal()">Run Calculation</button>
        <button class="danger" onclick="restart()">Reset System</button>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✕</span>

    <h3 style="margin-bottom:12px;">Cable Distance Calculator</h3>

    <input id="civilDistance" type="number" placeholder="Enter civil distance (m)" />

    <div class="actions">
      <button class="primary" onclick="calculateCable()">Calculate</button>
      <button class="secondary" onclick="clearInput()">Clear</button>
    </div>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
let cables = [];

function updateCables() {
  const input = document.getElementById("cablesInput").value;
  cables = input.split(",")
    .map(x => parseFloat(x.trim()))
    .filter(x => !isNaN(x));

  document.getElementById("cablesList").textContent =
    cables.length ? cables.join("m • ") + "m" : "No cables loaded";
}

function calculateCable() {
  const d = parseFloat(document.getElementById("civilDistance").value);
  const result = document.getElementById("result");

  if (!d || cables.length === 0) {
    result.className = "result error";
    result.innerText = "Invalid input or no cables";
    return;
  }

  const required = d + 10;

  const match = cables.find(c => c >= required);

  if (match) {
    result.className = "result success";
    result.innerHTML = `Optimal Cable: <b>${match}m</b>`;
  } else {
    result.className = "result error";
    result.innerText = "No suitable cable found";
  }
}

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function clearInput() {
  document.getElementById("civilDistance").value = "";
}

function restart() {
  cables = [];
  document.getElementById("cablesInput").value = "";
  document.getElementById("cablesList").textContent = "No cables loaded";
}

function exportCables() {
  const blob = new Blob([cables.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cables.csv";
  a.click();
}
</script>

</body>
</html>
